<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — Arshanemi Tools</title>
<meta name="description" content="Sign in with your Arshanemi account to open your tools dashboard." />

<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tailwind-config.js"></script>
<link rel="stylesheet" href="assets/theme.css" />
</head>

<body class="bg-background text-foreground antialiased min-h-screen">

<div id="scroll-progress" class="fixed top-0 left-0 h-[3px] w-full scale-x-0 bg-gradient-to-r from-accent via-accent-vivid to-cyan z-[60]"></div>

<div class="cursor-dot hidden md:block"></div>
<div class="cursor-ring hidden md:block"></div>

<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
  <div class="absolute -top-32 -left-24 w-[28rem] h-[28rem] bg-accent/25 rounded-full blur-[110px] animate-blob"></div>
  <div class="absolute top-1/3 -right-24 w-[26rem] h-[26rem] bg-accent-vivid/20 rounded-full blur-[110px] animate-blob" style="animation-delay:3s"></div>
  <div class="absolute bottom-0 left-1/4 w-[24rem] h-[24rem] bg-cyan/20 rounded-full blur-[110px] animate-blob" style="animation-delay:6s"></div>
  <div class="absolute inset-0 grid-overlay"></div>
  <div class="absolute inset-0 noise-overlay"></div>
</div>

<main class="min-h-screen flex items-center justify-center px-4 py-16">
  <div class="reveal w-full max-w-md rounded-3xl border border-divider bg-card/60 backdrop-blur-xl p-8 sm:p-10 shadow-2xl shadow-black/40">

    <div class="flex items-center gap-2 font-extrabold text-lg tracking-tight mb-8">
      <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent to-cyan flex items-center justify-center text-sm">⚡</span>
      Arshanemi<span class="gradient-text">Tools</span>
    </div>

    <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight">Welcome back</h1>
    <p class="mt-2 text-sm text-muted">Sign in with your Arshanemi account to open your tools.</p>

    <form id="login-form" class="mt-8 space-y-5" novalidate>
      <div>
        <label for="identifier" class="block text-sm font-medium text-muted mb-1.5">Email or mobile number</label>
        <input
          id="identifier"
          name="identifier"
          type="text"
          autocomplete="username"
          required
          autofocus
          class="w-full rounded-xl border border-divider bg-surface/80 px-4 py-3 text-sm text-foreground placeholder:text-subtle focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent/50 transition-colors"
          placeholder="you@company.com"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-muted mb-1.5">Password</label>
        <div class="relative">
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            class="w-full rounded-xl border border-divider bg-surface/80 px-4 py-3 pr-11 text-sm text-foreground placeholder:text-subtle focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent/50 transition-colors"
            placeholder="••••••••"
          />
          <button
            type="button"
            id="toggle-password"
            aria-label="Show password"
            class="absolute inset-y-0 right-0 flex items-center px-3 text-subtle hover:text-foreground transition-colors"
          >
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <p id="login-error" class="hidden text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></p>

      <button
        id="login-submit"
        type="submit"
        class="magnetic w-full inline-flex items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-accent to-cyan px-5 py-3.5 font-semibold text-background shadow-lg shadow-accent/30 hover:shadow-cyan/30 transition-shadow disabled:opacity-60 disabled:cursor-not-allowed"
      >
        <span id="login-submit-label">Sign In</span>
        <svg id="login-spinner" class="hidden animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2a10 10 0 0 1 10 10"/></svg>
        <svg id="login-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </form>

    <p class="mt-8 text-center text-xs text-subtle">Protected by Arshanemi account authentication.</p>
  </div>
</main>

<script src="assets/ui.js"></script>
<script src="assets/theme-auth.js"></script>
<script>
  loadTheme();

  if (isLoggedIn()) {
    location.replace('index.html');
  } else {
    initReveal();
    initMagnetic();
    initCursor();
    initScrollProgress();
    document.querySelectorAll('.reveal').forEach((el) => el.classList.add('is-visible'));

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const submitBtn = document.getElementById('login-submit');
    const submitLabel = document.getElementById('login-submit-label');
    const spinner = document.getElementById('login-spinner');
    const arrow = document.getElementById('login-arrow');
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-password');
    const eyeIcon = document.getElementById('eye-icon');

    toggleBtn.addEventListener('click', () => {
      const show = passwordInput.type === 'password';
      passwordInput.type = show ? 'text' : 'password';
      toggleBtn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      eyeIcon.innerHTML = show
        ? '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.6 21.6 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.6 21.6 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/>';
    });

    function setLoading(loading) {
      submitBtn.disabled = loading;
      spinner.classList.toggle('hidden', !loading);
      arrow.classList.toggle('hidden', loading);
      submitLabel.textContent = loading ? 'Signing in…' : 'Sign In';
    }

    function showError(message) {
      errorEl.textContent = message;
      errorEl.classList.remove('hidden');
    }

    function hideError() {
      errorEl.classList.add('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      setLoading(true);

      const identifier = form.identifier.value.trim();
      const password = form.password.value;

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showError(data.error || 'Unable to sign in. Please try again.');
          setLoading(false);
          return;
        }

        saveAuthTokens({
          accessToken: data.accessToken,
          refreshToken: data.refreshToken,
          expiresIn: data.expiresIn,
          user: data.user,
        });

        submitLabel.textContent = 'Success — redirecting…';
        redirectAfterLogin();
      } catch {
        showError('Could not reach the server. Check your connection and try again.');
        setLoading(false);
      }
    });
  }
</script>
</body>
</html>
